<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayur & Madhura's Wedding Invitation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #E6E6FA; /* Lavender */
            color: #4B0082; /* Indigo for text */
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            border: 2px solid #C0C0C0; /* Silver */
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1, h2, h3 {
            text-align: center;
        }
        .countdown {
            font-size: 2em;
            text-align: center;
            margin: 20px 0;
        }
        .music-toggle {
            text-align: center;
            margin: 20px 0;
        }
        audio {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>You're Invited to Our Wedding!</h1>
        <h2>Mayur & Madhura</h2>
        <h3>May 20, 2026</h3>
        <div class="countdown" id="countdown"></div>
        <h3>Events:</h3>
        <ul>
            <li>Mehendi: May 19, 2026</li>
            <li>Sangeet: May 20, 2026</li>
            <li>Ceremony: May 20, 2026</li>
            <li>Reception: May 21, 2026</li>
        </ul>
        <h3>Family Details:</h3>
        <p>Mayur's Family: [Details Here]</p>
        <p>Madhura's Family: [Details Here]</p>
        <div class="music-toggle">
            <audio controls>
                <source src="wedding-music.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>
    <script>
        // Countdown Timer
        const weddingDate = new Date('2026-05-20T00:00:00Z');
        const countdownElement = document.getElementById('countdown');
        function updateCountdown() {
            const now = new Date();
            const timeDifference = weddingDate - now;
            const days = Math.floor(timeDifference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDifference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDifference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDifference % (1000 * 60)) / 1000);
            countdownElement.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s until the wedding!`;
        }
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
