<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayur & Madhura Wedding Invitation</title>
    <style>
        body {
            background-color: lavender;
            color: silver;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            padding: 50px;
        }
        .countdown {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>You're Invited to the Wedding of Mayur & Madhura!</h1>
        <h2>Events:</h2>
        <ul>
            <li>Engagement Ceremony: 2026-03-04</li>
            <li>Mehendi: 2026-03-05</li>
            <li>Sangeet: 2026-03-06</li>
            <li>Wedding Ceremony: 2026-03-07</li>
        </ul>
        <h2>Family Details:</h2>
        <p>The families of Mayur and Madhura warmly invite you to join us for our celebration.</p>
        <div class="countdown" id="countdown"></div>
        <button onclick="toggleMusic()">🎵 Toggle Music</button>
        <audio id="weddingMusic" loop>
            <source src="music/wedding_song.mp3" type="audio/mp3">
            Your browser does not support the audio tag.
        </audio>
    </div>
    
    <script>
        // Countdown Timer
        const weddingDate = new Date("2026-03-07T00:00:00").getTime();
        const countdown = document.getElementById("countdown");
        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            countdown.innerHTML = days + " days until the wedding!";
            
            if (distance < 0) {
                clearInterval(x);
                countdown.innerHTML = "It's time to celebrate!";
            }
        }, 1000);

        // Music Toggle Function
        function toggleMusic() {
            const music = document.getElementById("weddingMusic");
            if (music.paused) {
                music.play();
            } else {
                music.pause();
            }
        }
    </script>
</body>
</html>
